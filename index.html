<!DOCTYPE html>
<html>
    <head>
        <title>Typing Speed Test</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <p id="sentence">The brown fox jumps over the lazy dog.</p>
            <textarea id="userInput" rows="3" cols="50" placeholder="Start typing here..."></textarea>
            <div>
                <p>Time: <span id="timer">0</span></p>
                <p>Words per minute: <span id="wpm">0</span></p>
            </div>
            <button id="resetBtn">Retry</button>
        </div>
        <script src="script.js"></script>
    </body>
</html>
